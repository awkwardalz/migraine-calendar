[build]
  base    = "client"
  command = "npm run build"
  publish = "client/dist"

# Proxy all /api/* requests to the Railway backend.
# Replace the URL below with your actual Render service URL after deploying.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-RAILWAY-SERVICE.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — send all non-asset routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
